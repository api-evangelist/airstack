schema {
  query: Query
}

"""Custom scalar: blockchain address"""
scalar Address

"""Custom scalar: any JSON value"""
scalar Any

"""Custom scalar: date range string"""
scalar DateRange

"""Custom scalar: blockchain identity (address, ENS, Farcaster id, Lens handle)"""
scalar Identity

"""Custom scalar: integer as string"""
scalar IntString

"""Custom scalar: generic map / JSON object"""
scalar Map

"""Custom scalar: date-time"""
scalar Time

"""Custom scalar: time range"""
scalar TimeRange


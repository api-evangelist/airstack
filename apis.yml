apis:
  - name: Airstack GraphQL API
    description: >-
      The primary Airstack API offering composable GraphQL queries across on-chain
      and off-chain Web3 data. Query NFT balances, token transfers, wallet
      identities, ENS names, POAP badges, and social graph data across Ethereum,
      Polygon, Base, and other EVM chains. Supports cross-chain and cross-project
      queries in a single request with cursor-based pagination.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://docs.airstack.xyz/
    baseURL: https://api.airstack.xyz/graphql

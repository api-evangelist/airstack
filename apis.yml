name: Airstack
description: >-
  Airstack is a Web3 data aggregation platform providing GraphQL and REST APIs
  for querying on-chain and off-chain data across multiple blockchains. Developers
  can query NFT ownership, token balances, wallet identities, ENS names, POAP
  badges, and cross-chain data in a single composable request. The platform indexes
  Ethereum, Polygon, Base, and other EVM-compatible chains, enabling complex
  cross-project queries without running your own infrastructure.

- name: Airstack Farcaster Webhooks API
  description: Airstack Webhooks API allows developers to register HTTP callback endpoints
    to receive real-time Farcaster Hub events. Supports creating, listing, and deleting
    webhooks, as well as testing webhook filters against sample events.

- name: Airstack Farcaster Hub API
  description: Airstack provides read/write access to Farcaster Hubs via REST and
    gRPC interfaces. Note that as of late 2024 Airstack has deprecated all Farcaster-related
    GraphQL APIs. Developers needing Farcaster data are directed to migrate to Neynar
    APIs, and Moxie-related data is available at developer.moxie.xyz.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.airstack.xyz/
  baseURL: https://hubs.airstack.xyz
